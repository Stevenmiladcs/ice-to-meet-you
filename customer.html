<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ice to Meet You 🧊</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; }
    #map { width: 100%; height: 100vh; }

    /* Top bar */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 11px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.10);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; border: 2.5px solid #2BB5A0; flex-shrink: 0; }
    .meta { flex: 1; min-width: 0; }
    .meta-name { font-size: 15px; font-weight: 700; color: #111827; }
    .meta-sub  { font-size: 12px; color: #6b7280; margin-top: 1px; }
    .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px; flex-shrink: 0; }
    .pill-live    { background: #d1fae5; color: #065f46; border: 1px solid #34d399; }
    .pill-offline { background: #f3f4f6; color: #9ca3af; border: 1px solid #e5e7eb; }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; }
    .pill-live .pill-dot    { background: #10b981; animation: blink 1.4s infinite; }
    .pill-offline .pill-dot { background: #d1d5db; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }

    /* Offline banner */
    .warn-banner {
      position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
      z-index: 999; background: #fffbeb; border: 1px solid #fbbf24; color: #78350f;
      font-size: 13px; font-weight: 500; padding: 8px 18px; border-radius: 10px;
      white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,0.08); display: none;
    }

    /* Bottom */
    .time-chip {
      position: fixed; bottom: 22px; left: 14px; z-index: 1000;
      background: rgba(17,24,39,0.72); color: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px); font-size: 12px; padding: 7px 13px; border-radius: 20px;
    }
    .find-btn {
      position: fixed; bottom: 22px; right: 14px; z-index: 1000;
      background: #2BB5A0; color: #fff; border: none; border-radius: 50px;
      padding: 12px 22px; font-size: 14px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      box-shadow: 0 4px 22px rgba(43,181,160,0.55);
      transition: transform 0.15s, filter 0.15s;
    }
    .find-btn:active { transform: scale(0.96); }

    /* Toast notification */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 2000; background: #1f2937; color: #fff;
      font-size: 13px; font-weight: 500; padding: 10px 20px; border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); white-space: nowrap;
      animation: fadeInOut 2.8s ease forwards;
    }
    @keyframes fadeInOut {
      0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15%  { opacity: 1; transform: translateX(-50%) translateY(0); }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Vendor marker */
    .vmarker { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .rings { position: absolute; top: 0; left: 0; width: 58px; height: 58px; }
    .ring { position: absolute; border-radius: 50%; border: 2px solid rgba(43,181,160,0.7); animation: ripple 2.4s ease-out infinite; top:0;left:0;width:100%;height:100%; }
    .ring:nth-child(2) { animation-delay: 0.8s; }
    .ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes ripple { 0%{transform:scale(1);opacity:.9} 100%{transform:scale(2.2);opacity:0} }
    .mphoto-wrap { position:relative; width:58px; height:58px; border-radius:50%; overflow:hidden; border:3px solid #2BB5A0; box-shadow:0 5px 20px rgba(0,0,0,0.35); background:#e6f7f5; }
    .mphoto { width:100%; height:100%; object-fit:cover; display:block; }
    .mlabel { margin-top:6px; background:#111827; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:10px; white-space:nowrap; }
    .mtip { width:0; height:0; border-left:6px solid transparent; border-right:6px solid transparent; border-top:8px solid #111827; margin-top:1px; }

    /* Customer's own location dot */
    .my-dot { width:14px; height:14px; border-radius:50%; background:#3b82f6; border:2px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
  </style>
</head>

  const FALLBACK = 'data:image/svg+xml;utf8,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60"><rect width="60" height="60" rx="30" fill="#2BB5A0"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="32">🚴</text></svg>'
  );
  const vendorIcon = L.divIcon({
    className: '',
    html: `<div class="vmarker">
      <div style="position:relative;width:58px;height:58px;">
        <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
        <div class="mphoto-wrap"><img class="mphoto" src="${PHOTO}" onerror="this.src='${FALLBACK}'"/></div>
      </div>
      <div class="mlabel">🧃 Nubi</div>
      <div class="mtip"></div>
    </div>`,
    iconSize: [80, 105], iconAnchor: [40, 105]
  });

  const myIcon = L.divIcon({
    className: '', html: '<div class="my-dot"></div>',
    iconSize: [14,14], iconAnchor: [7,7]
  });

  let vendorMarker = null;
  let myMarker     = null;
  let lastPos      = null;
  let isOnline     = false;

  // ── Customer shares their location ───────────
  function startSharingLocation() {
    if (!navigator.geolocation) return;
    navigator.geolocation.watchPosition((pos) => {
      const { latitude: lat, longitude: lng } = pos.coords;
      custRef.child(myId).set({ lat, lng, timestamp: Date.now() });

      // Show customer's own blue dot on map
      if (!myMarker) {
        myMarker = L.marker([lat, lng], { icon: myIcon })
          .bindPopup('📍 You are here').addTo(map);
      } else {
        myMarker.setLatLng([lat, lng]);
      }
    }, null, { enableHighAccuracy: true, maximumAge: 5000 });
  }
  startSharingLocation();

  // Clean up when customer leaves
  window.addEventListener('beforeunload', () => {
    custRef.child(myId).remove();
  });

  // ── Find Nubi button ──────────────────────────
  function centerOnVendor() {
    if (lastPos && isOnline) {
      map.flyTo(lastPos, 17, { duration: 1.1 });
    } else if (lastPos && !isOnline) {
      showToast('⚠️ Nubi stopped sharing his location');
    } else {
      showToast('🕐 Nubi is not online yet — check back soon!');
    }
  }

  function showToast(msg) {
    // Remove existing toast if any
    document.querySelectorAll('.toast').forEach(t => t.remove());
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Firebase: listen to Nubi's location ──────
  vendorRef.on('value', (snap) => {
    const data = snap.val();
    if (!data) return;

    const { lat, lng, online, timestamp } = data;
    const pill    = document.getElementById('live-pill');
    const pillTxt = document.getElementById('pill-text');
    const banner  = document.getElementById('warn-banner');

    isOnline = !!online;

    if (online) {
      pill.className = 'pill pill-live';
      pillTxt.textContent = 'LIVE';
      banner.style.display = 'none';
    } else {
      pill.className = 'pill pill-offline';
      pillTxt.textContent = 'OFFLINE';
      banner.style.display = 'block';
    }

    if (lat && lng) {
      lastPos = [lat, lng];
      if (!vendorMarker) {
        vendorMarker = L.marker([lat, lng], { icon: vendorIcon }).addTo(map);
        map.flyTo([lat, lng], 17, { duration: 1.6 });
      } else {
        vendorMarker.setLatLng([lat, lng]);
      }
      const when = timestamp
        ? new Date(timestamp).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' })
        : '—';
      document.getElementById('time-chip').textContent = 'Updated ' + when;
    }
  });
</script>
